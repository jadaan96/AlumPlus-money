services:
  postgres:
    image: postgres:16-alpine
    container_name: workshop-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: workshop
      POSTGRES_PASSWORD: workshop_secret
      POSTGRES_DB: workshop_accounts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workshop -d workshop_accounts"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
